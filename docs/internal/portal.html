<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDD Governance Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --primary: #58a6ff;
            --danger: #f85149;
            --warning: #d29922;
            --success: #238636;
            --high: #ff7b72;
            --medium: #d29922;
            --low: #79c0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            color: #fff;
        }

        header .meta {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Main Content */
        .portal-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card h2 {
            font-size: 1rem;
            color: #fff;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .risk-high {
            background: rgba(248, 81, 73, 0.15);
            color: var(--high);
            border: 1px solid rgba(248, 81, 73, 0.2);
        }

        .risk-medium {
            background: rgba(210, 153, 34, 0.15);
            color: var(--medium);
            border: 1px solid rgba(210, 153, 34, 0.2);
        }

        .risk-low {
            background: rgba(88, 166, 255, 0.15);
            color: var(--low);
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .outcome-pass {
            color: var(--success);
        }

        .outcome-fail {
            color: var(--danger);
        }

        .outcome-blocked {
            color: var(--warning);
        }

        .agent-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            color: var(--primary);
        }

        .timestamp {
            color: var(--text-dim);
            white-space: nowrap;
        }

        .request-text {
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 0.5rem;
        }

        .reasoning-text {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* Search & Filter */
        .controls {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        input[type="text"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            flex-grow: 1;
            font-family: inherit;
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            padding-bottom: 2rem;
        }

        /* Micro-animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        tr {
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>SDD Governance Portal</h1>
                <p class="meta">Visual Decision Ledger & Audit Trail</p>
            </div>
            <div id="last-updated" class="timestamp"></div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Decisions</div>
                <div id="stat-total" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Critical Risks (High)</div>
                <div id="stat-high" class="stat-value" style="color: var(--high)">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Success Rate</div>
                <div id="stat-success" class="stat-value" style="color: var(--success)">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Agents</div>
                <div id="stat-agents" class="stat-value" style="color: var(--primary)">0</div>
            </div>
        </div>

        <div class="portal-layout">
            <div class="card">
                <div class="card-header">
                    <h2>Decision Ledger History</h2>
                    <div id="row-count" style="font-size: 0.8rem; color: var(--text-dim)"></div>
                </div>
                <div class="controls">
                    <input type="text" id="search" placeholder="Search requests, reasoning, or agent ID...">
                </div>
                <div class="table-wrapper">
                    <table id="ledger-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Agent</th>
                                <th>Decision & Reasoning</th>
                                <th>Risk</th>
                                <th>Outcome</th>
                            </tr>
                        </thead>
                        <tbody id="ledger-body">
                            <!-- Data loaded from decision_ledger.jsonl via fetch -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer>
            Software Development Department &copy; 2026 | Generated by SDD Automation
        </footer>
    </div>

    <script>
        async function initPortal() {
            let data = [];
            try {
                const res = await fetch('../../production/traces/decision_ledger.jsonl');
                if (!res.ok) throw new Error('fetch failed');
                const text = await res.text();
                data = text.trim().split('\n').filter(Boolean).map(l => JSON.parse(l)).reverse();
            } catch {
                document.getElementById('ledger-body').innerHTML =
                    '<tr><td colspan="5" style="text-align:center;padding:4rem;color:var(--text-dim)">Open portal via a local server or from the repo root.<br><code>npx serve .</code></td></tr>';
                return;
            }

            render(data);

            // Setup Search
            document.getElementById('search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = data.filter(item =>
                    item.request.toLowerCase().includes(term) ||
                    item.reasoning.toLowerCase().includes(term) ||
                    item.agent_id.toLowerCase().includes(term)
                );
                render(filtered);
            });

            // Stats
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-high').innerText = data.filter(d => d.risk_tier === 'High').length;
            const successCount = data.filter(d => d.outcome === 'pass').length;
            document.getElementById('stat-success').innerText = data.length > 0 ? Math.round((successCount / data.length) * 100) + '%' : '0%';
            document.getElementById('stat-agents').innerText = new Set(data.map(d => d.agent_id)).size;
            document.getElementById('last-updated').innerText = 'Last updated: ' + new Date().toLocaleString();
        }

        function render(items) {
            const body = document.getElementById('ledger-body');
            document.getElementById('row-count').innerText = `${items.length} records found`;
            body.innerHTML = '';

            items.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.02}s`;

                const ts = new Date(item.ts).toLocaleString('vi-VN', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                tr.innerHTML = `
                    <td class="timestamp">${ts}</td>
                    <td class="agent-name">${item.agent_id}</td>
                    <td>
                        <div class="request-text">${item.request}</div>
                        <div class="reasoning-text">${item.reasoning}</div>
                        <div style="margin-top: 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--primary)">
                            Choice: ${item.choice}
                        </div>
                    </td>
                    <td>
                        <span class="badge risk-${item.risk_tier.toLowerCase()}">${item.risk_tier}</span>
                    </td>
                    <td>
                        <span class="outcome-${item.outcome.toLowerCase()}" style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">
                            ${item.outcome === 'pass' ? '✓ Pass' : item.outcome === 'fail' ? '✗ Fail' : '○ ' + item.outcome}
                        </span>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        window.addEventListener('DOMContentLoaded', initPortal);
    </script>
</body>

</html>
