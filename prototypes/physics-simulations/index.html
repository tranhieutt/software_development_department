<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vật Lý Tương Tác</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .tab-active { background: #3b82f6; color: white; }
    .tab-inactive { background: #1e293b; color: #94a3b8; }
    input[type=range] { accent-color: #3b82f6; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════
   MODULE 1: VA CHẠM ĐÀN HỒI
═══════════════════════════════════════════════ */
function CollisionSim() {
  const canvasRef = useRef(null);
  const stateRef = useRef(null);
  const rafRef = useRef(null);
  const [running, setRunning] = useState(false);
  const [params, setParams] = useState({ m1: 2, m2: 1, v1: 4, v2: -2 });
  const [result, setResult] = useState(null);

  const CANVAS_W = 700, CANVAS_H = 160;
  const R1 = 28, R2 = 20;

  const computeAfter = (m1, m2, v1, v2) => ({
    v1f: ((m1 - m2) * v1 + 2 * m2 * v2) / (m1 + m2),
    v2f: ((m2 - m1) * v2 + 2 * m1 * v1) / (m1 + m2),
  });

  const initState = useCallback(() => {
    const { m1, m2, v1, v2 } = params;
    stateRef.current = {
      x1: 120, x2: 560,
      vx1: v1 * 30, vx2: v2 * 30,
      collided: false,
      m1, m2
    };
    setResult(null);
  }, [params]);

  useEffect(() => { initState(); }, [params]);

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const s = stateRef.current;
    if (!s) return;

    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Track
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, CANVAS_H / 2 + 35); ctx.lineTo(CANVAS_W - 20, CANVAS_H / 2 + 35); ctx.stroke();

    // Ball 1
    const r1 = R1 * Math.sqrt(s.m1 / 2);
    const grad1 = ctx.createRadialGradient(s.x1 - 6, CANVAS_H/2 - 6, 2, s.x1, CANVAS_H/2, r1);
    grad1.addColorStop(0, '#93c5fd'); grad1.addColorStop(1, '#1d4ed8');
    ctx.beginPath(); ctx.arc(s.x1, CANVAS_H/2, r1, 0, Math.PI * 2);
    ctx.fillStyle = grad1; ctx.fill();
    ctx.fillStyle = 'white'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`m=${s.m1}kg`, s.x1, CANVAS_H/2 + 4);

    // Ball 2
    const r2 = R2 * Math.sqrt(s.m2 / 1);
    const grad2 = ctx.createRadialGradient(s.x2 - 5, CANVAS_H/2 - 5, 2, s.x2, CANVAS_H/2, r2);
    grad2.addColorStop(0, '#fca5a5'); grad2.addColorStop(1, '#b91c1c');
    ctx.beginPath(); ctx.arc(s.x2, CANVAS_H/2, r2, 0, Math.PI * 2);
    ctx.fillStyle = grad2; ctx.fill();
    ctx.fillStyle = 'white'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`m=${s.m2}kg`, s.x2, CANVAS_H/2 + 4);

    // Velocity arrows
    const drawArrow = (x, y, vx, color) => {
      if (Math.abs(vx) < 1) return;
      const len = Math.min(Math.abs(vx) * 1.5, 60);
      const dir = vx > 0 ? 1 : -1;
      ctx.strokeStyle = color; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(x, y - 42); ctx.lineTo(x + dir * len, y - 42); ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.moveTo(x + dir * len, y - 42);
      ctx.lineTo(x + dir * (len - 8), y - 47); ctx.lineTo(x + dir * (len - 8), y - 37); ctx.fill();
      ctx.font = '10px sans-serif'; ctx.fillStyle = color; ctx.textAlign = 'center';
      ctx.fillText(`${(vx/30).toFixed(1)} m/s`, x + dir * len * 0.5, y - 50);
    };
    drawArrow(s.x1, CANVAS_H/2, s.vx1, '#60a5fa');
    drawArrow(s.x2, CANVAS_H/2, s.vx2, '#f87171');
  }, []);

  const step = useCallback(() => {
    const s = stateRef.current;
    if (!s) return;
    const dt = 1 / 60;
    const r1 = R1 * Math.sqrt(s.m1 / 2);
    const r2 = R2 * Math.sqrt(s.m2 / 1);

    s.x1 += s.vx1 * dt;
    s.x2 += s.vx2 * dt;

    // Bounce walls
    if (s.x1 - r1 < 20) { s.x1 = 20 + r1; s.vx1 = Math.abs(s.vx1); }
    if (s.x1 + r1 > CANVAS_W - 20) { s.x1 = CANVAS_W - 20 - r1; s.vx1 = -Math.abs(s.vx1); }
    if (s.x2 - r2 < 20) { s.x2 = 20 + r2; s.vx2 = Math.abs(s.vx2); }
    if (s.x2 + r2 > CANVAS_W - 20) { s.x2 = CANVAS_W - 20 - r2; s.vx2 = -Math.abs(s.vx2); }

    // Collision
    if (!s.collided && Math.abs(s.x1 - s.x2) <= r1 + r2) {
      s.collided = true;
      const { v1f, v2f } = computeAfter(s.m1, s.m2, s.vx1 / 30, s.vx2 / 30);
      s.vx1 = v1f * 30;
      s.vx2 = v2f * 30;
      const ke1b = 0.5 * s.m1 * Math.pow(params.v1, 2);
      const ke2b = 0.5 * s.m2 * Math.pow(params.v2, 2);
      setResult({ v1f: v1f.toFixed(2), v2f: v2f.toFixed(2), ke1b: ke1b.toFixed(1), ke2b: ke2b.toFixed(1), v1f_ke: (0.5*s.m1*v1f*v1f).toFixed(1), v2f_ke: (0.5*s.m2*v2f*v2f).toFixed(1) });
      setTimeout(() => { s.collided = false; }, 500);
    }
    draw();
    rafRef.current = requestAnimationFrame(step);
  }, [draw, params]);

  const toggle = () => {
    if (running) {
      cancelAnimationFrame(rafRef.current);
      setRunning(false);
    } else {
      initState();
      setRunning(true);
      rafRef.current = requestAnimationFrame(step);
    }
  };

  useEffect(() => () => cancelAnimationFrame(rafRef.current), []);

  return (
    <div className="space-y-4">
      <div className="card">
        <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H} className="w-full rounded-lg bg-slate-900" />
      </div>

      <div className="grid grid-cols-2 gap-4">
        <div className="card space-y-3">
          <h3 className="text-blue-400 font-bold text-sm">⚪ Vật 1 (xanh)</h3>
          {[['m1','Khối lượng (kg)',0.5,5,0.5],['v1','Vận tốc đầu (m/s)',-8,8,0.5]].map(([k,label,min,max,step]) => (
            <div key={k}>
              <div className="flex justify-between text-xs text-slate-400 mb-1"><span>{label}</span><span className="text-white font-bold">{params[k]}</span></div>
              <input type="range" min={min} max={max} step={step} value={params[k]} className="w-full"
                onChange={e => setParams(p => ({...p, [k]: parseFloat(e.target.value)}))} />
            </div>
          ))}
        </div>
        <div className="card space-y-3">
          <h3 className="text-red-400 font-bold text-sm">🔴 Vật 2 (đỏ)</h3>
          {[['m2','Khối lượng (kg)',0.5,5,0.5],['v2','Vận tốc đầu (m/s)',-8,8,0.5]].map(([k,label,min,max,step]) => (
            <div key={k}>
              <div className="flex justify-between text-xs text-slate-400 mb-1"><span>{label}</span><span className="text-white font-bold">{params[k]}</span></div>
              <input type="range" min={min} max={max} step={step} value={params[k]} className="w-full"
                onChange={e => setParams(p => ({...p, [k]: parseFloat(e.target.value)}))} />
            </div>
          ))}
        </div>
      </div>

      <div className="flex gap-3 items-center">
        <button onClick={toggle} className={`px-5 py-2 rounded-lg font-bold text-sm ${running ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
          {running ? '⏹ Dừng' : '▶ Bắt đầu'}
        </button>
        <div className="text-xs text-slate-400">
          p trước = <span className="text-white">{(params.m1*params.v1 + params.m2*params.v2).toFixed(2)} kg·m/s</span>
        </div>
      </div>

      {result && (
        <div className="card border-green-500/40">
          <h3 className="text-green-400 font-bold text-sm mb-3">✅ Kết quả sau va chạm</h3>
          <div className="grid grid-cols-2 gap-4 text-sm">
            <div>
              <div className="text-slate-400 text-xs mb-1">Vận tốc sau</div>
              <div>v₁' = <span className="text-blue-400 font-bold">{result.v1f} m/s</span></div>
              <div>v₂' = <span className="text-red-400 font-bold">{result.v2f} m/s</span></div>
              <div className="text-slate-400 text-xs mt-2">p sau = <span className="text-white">{(params.m1*parseFloat(result.v1f)+params.m2*parseFloat(result.v2f)).toFixed(2)} kg·m/s</span></div>
            </div>
            <div>
              <div className="text-slate-400 text-xs mb-1">Động năng (J)</div>
              <div className="text-xs">KE₁: {result.ke1b} → <span className="text-blue-400">{result.v1f_ke}</span></div>
              <div className="text-xs">KE₂: {result.ke2b} → <span className="text-red-400">{result.v2f_ke}</span></div>
              <div className="text-xs mt-1 text-slate-400">Tổng: {(parseFloat(result.ke1b)+parseFloat(result.ke2b)).toFixed(1)} → <span className="text-green-400">{(parseFloat(result.v1f_ke)+parseFloat(result.v2f_ke)).toFixed(1)} J</span></div>
            </div>
          </div>
        </div>
      )}

      <div className="card text-xs text-slate-400 space-y-1">
        <div className="text-yellow-400 font-bold mb-2">📐 Công thức va chạm đàn hồi</div>
        <div>v₁' = (m₁−m₂)v₁ + 2m₂v₂) / (m₁+m₂)</div>
        <div>v₂' = (m₂−m₁)v₂ + 2m₁v₁) / (m₁+m₂)</div>
        <div className="text-slate-500 mt-1">Bảo toàn động lượng & động năng</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MODULE 2: SÓNG ÂM
═══════════════════════════════════════════════ */
function SoundWaveSim() {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const tRef = useRef(0);
  const [playing, setPlaying] = useState(false);
  const [params, setParams] = useState({ f1: 2, a1: 50, f2: 3, a2: 40, mode: 'both' });
  const paramsRef = useRef(params);
  useEffect(() => { paramsRef.current = params; }, [params]);

  const W = 700, H = 280;

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const p = paramsRef.current;
    const t = tRef.current;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, W, H);

    const drawWave = (yBase, freq, amp, color, label, phaseOff = 0) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let x = 0; x <= W; x++) {
        const angle = (x / W) * Math.PI * 2 * freq - t * freq * 2 + phaseOff;
        const y = yBase + Math.sin(angle) * amp;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.fillStyle = color; ctx.font = 'bold 11px sans-serif';
      ctx.fillText(label, 8, yBase - amp - 6);
    };

    const drawSum = (yBase) => {
      ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 3;
      ctx.beginPath();
      for (let x = 0; x <= W; x++) {
        const a1 = (x / W) * Math.PI * 2 * p.f1 - t * p.f1 * 2;
        const a2 = (x / W) * Math.PI * 2 * p.f2 - t * p.f2 * 2;
        const y = yBase + Math.sin(a1) * p.a1 * 0.5 + Math.sin(a2) * p.a2 * 0.5;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.fillStyle = '#a78bfa'; ctx.font = 'bold 11px sans-serif';
      ctx.fillText('Sóng tổng hợp', 8, yBase - (p.a1 + p.a2) * 0.5 - 6);
    };

    if (p.mode === 'both' || p.mode === 'wave1') drawWave(75, p.f1, p.a1 * 0.5, '#60a5fa', `Sóng 1 — f=${p.f1}Hz, A=${p.a1}`);
    if (p.mode === 'both' || p.mode === 'wave2') drawWave(175, p.f2, p.a2 * 0.5, '#f87171', `Sóng 2 — f=${p.f2}Hz, A=${p.a2}`);
    drawSum(240);

    // Grid lines
    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
    [75, 175, 240].forEach(y => {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    });

    tRef.current += 0.04;
    rafRef.current = requestAnimationFrame(draw);
  }, []);

  const toggle = () => {
    if (playing) {
      cancelAnimationFrame(rafRef.current);
      setPlaying(false);
    } else {
      setPlaying(true);
      draw();
    }
  };

  useEffect(() => {
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [draw]);

  const beats = Math.abs(params.f1 - params.f2);

  return (
    <div className="space-y-4">
      <div className="card p-0 overflow-hidden">
        <canvas ref={canvasRef} width={W} height={H} className="w-full" />
      </div>

      <div className="grid grid-cols-2 gap-4">
        <div className="card space-y-3">
          <h3 className="text-blue-400 font-bold text-sm">〜 Sóng 1</h3>
          {[['f1','Tần số (Hz)',1,10,0.5],['a1','Biên độ',10,80,5]].map(([k,label,min,max,step]) => (
            <div key={k}>
              <div className="flex justify-between text-xs text-slate-400 mb-1"><span>{label}</span><span className="text-white font-bold">{params[k]}</span></div>
              <input type="range" min={min} max={max} step={step} value={params[k]} className="w-full"
                onChange={e => setParams(p => ({...p, [k]: parseFloat(e.target.value)}))} />
            </div>
          ))}
        </div>
        <div className="card space-y-3">
          <h3 className="text-red-400 font-bold text-sm">〜 Sóng 2</h3>
          {[['f2','Tần số (Hz)',1,10,0.5],['a2','Biên độ',10,80,5]].map(([k,label,min,max,step]) => (
            <div key={k}>
              <div className="flex justify-between text-xs text-slate-400 mb-1"><span>{label}</span><span className="text-white font-bold">{params[k]}</span></div>
              <input type="range" min={min} max={max} step={step} value={params[k]} className="w-full"
                onChange={e => setParams(p => ({...p, [k]: parseFloat(e.target.value)}))} />
            </div>
          ))}
        </div>
      </div>

      <div className="card flex flex-wrap gap-3 items-center">
        <span className="text-xs text-slate-400">Hiển thị:</span>
        {[['both','Cả hai'],['wave1','Chỉ Sóng 1'],['wave2','Chỉ Sóng 2']].map(([v,label]) => (
          <button key={v} onClick={() => setParams(p => ({...p, mode: v}))}
            className={`px-3 py-1 rounded text-xs font-medium ${params.mode===v ? 'bg-blue-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
            {label}
          </button>
        ))}
        <div className="ml-auto text-xs">
          Phách: <span className="text-yellow-400 font-bold">{beats} Hz</span>
          {beats === 0 && <span className="ml-2 text-green-400 text-xs badge bg-green-900/50">Cộng hưởng!</span>}
        </div>
      </div>

      <div className="card text-xs text-slate-400 space-y-1">
        <div className="text-yellow-400 font-bold mb-2">📐 Nguyên lý chồng chất sóng</div>
        <div>y = A₁sin(2πf₁t) + A₂sin(2πf₂t)</div>
        <div>Tần số phách = |f₁ − f₂|</div>
        <div className="text-slate-500">Khi f₁ = f₂ → Cộng hưởng — biên độ tổng cực đại</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MODULE 3: ĐIỆN TỪ
═══════════════════════════════════════════════ */
function ElectromagnetismSim() {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const tRef = useRef(0);
  const [params, setParams] = useState({ current: 5, mode: 'wire' });
  const paramsRef = useRef(params);
  useEffect(() => { paramsRef.current = params; }, [params]);

  const W = 700, H = 340;

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const p = paramsRef.current;
    const t = tRef.current;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;

    if (p.mode === 'wire') {
      // Magnetic field circles around infinite wire
      const maxR = 220;
      const numLines = 8;
      for (let i = 1; i <= numLines; i++) {
        const r = (i / numLines) * maxR;
        const alpha = Math.max(0.08, 0.7 - (r / maxR) * 0.6);
        const hue = 200 + (r / maxR) * 60;
        ctx.strokeStyle = `hsla(${hue}, 80%, 65%, ${alpha})`;
        ctx.lineWidth = Math.max(0.5, 2.5 - (r / maxR) * 2);
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();

        // Animated direction arrows on each circle
        const arrowCount = Math.max(3, Math.floor(i * 1.5));
        for (let j = 0; j < arrowCount; j++) {
          const angle = (j / arrowCount) * Math.PI * 2 + t * (p.current > 0 ? 1 : -1) * 0.4;
          const ax = cx + Math.cos(angle) * r;
          const ay = cy + Math.sin(angle) * r;
          const tangentAngle = angle + Math.PI / 2 * (p.current >= 0 ? 1 : -1);
          const aLen = 8;
          ctx.strokeStyle = `hsla(${hue}, 80%, 75%, ${alpha + 0.2})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(ax - Math.cos(tangentAngle) * aLen, ay - Math.sin(tangentAngle) * aLen);
          ctx.lineTo(ax + Math.cos(tangentAngle) * aLen, ay + Math.sin(tangentAngle) * aLen);
          ctx.stroke();
          // Arrowhead
          const hx = ax + Math.cos(tangentAngle) * aLen;
          const hy = ay + Math.sin(tangentAngle) * aLen;
          ctx.fillStyle = `hsla(${hue}, 80%, 75%, ${alpha + 0.2})`;
          ctx.beginPath();
          ctx.moveTo(hx, hy);
          ctx.lineTo(hx - Math.cos(tangentAngle - 0.5) * 5, hy - Math.sin(tangentAngle - 0.5) * 5);
          ctx.lineTo(hx - Math.cos(tangentAngle + 0.5) * 5, hy - Math.sin(tangentAngle + 0.5) * 5);
          ctx.closePath(); ctx.fill();
        }
      }

      // Wire cross-section
      ctx.fillStyle = p.current >= 0 ? '#fbbf24' : '#f87171';
      ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.current >= 0 ? '⊙' : '⊗', cx, cy);

      // Labels
      ctx.fillStyle = '#94a3b8'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(`Dây dẫn (I = ${p.current} A)`, cx, cy + 22);
      ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif';
      ctx.fillText('Đường sức từ B = μ₀I / (2πr)', cx, H - 20);

    } else {
      // Dipole / bar magnet field
      const N = 18, poles = [{x: cx - 80, q: 1}, {x: cx + 80, q: -1}];
      const gridStep = 28;

      for (let gx = gridStep; gx < W; gx += gridStep) {
        for (let gy = gridStep; gy < H; gy += gridStep) {
          let Ex = 0, Ey = 0;
          poles.forEach(pole => {
            const dx = gx - pole.x, dy = gy - cy;
            const r2 = dx * dx + dy * dy;
            if (r2 < 400) return;
            const r = Math.sqrt(r2);
            Ex += pole.q * dx / (r2 * r) * 50000;
            Ey += pole.q * dy / (r2 * r) * 50000;
          });
          const mag = Math.sqrt(Ex * Ex + Ey * Ey);
          if (mag < 0.5 || mag > 60) continue;
          const scale = Math.min(12, mag * 0.4);
          const nx = Ex / mag, ny = Ey / mag;
          const alpha = Math.min(0.9, mag / 30);
          ctx.strokeStyle = `rgba(96, 165, 250, ${alpha})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(gx - nx * scale, gy - ny * scale);
          ctx.lineTo(gx + nx * scale, gy + ny * scale);
          ctx.stroke();
          // arrowhead
          ctx.fillStyle = `rgba(96, 165, 250, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(gx + nx * scale, gy + ny * scale);
          ctx.lineTo(gx + nx * (scale - 5) - ny * 3, gy + ny * (scale - 5) + nx * 3);
          ctx.lineTo(gx + nx * (scale - 5) + ny * 3, gy + ny * (scale - 5) - nx * 3);
          ctx.closePath(); ctx.fill();
        }
      }

      // Draw magnets
      [{ x: cx - 80, label: 'N', color: '#ef4444' }, { x: cx + 80, label: 'S', color: '#3b82f6' }].forEach(m => {
        ctx.fillStyle = m.color;
        ctx.beginPath(); ctx.roundRect(m.x - 22, cy - 30, 44, 60, 6); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(m.label, m.x, cy);
      });

      ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('Đường sức từ của nam châm — từ N sang S bên ngoài', cx, H - 20);
    }

    tRef.current += 0.025;
    rafRef.current = requestAnimationFrame(draw);
  }, []);

  useEffect(() => {
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [draw]);

  return (
    <div className="space-y-4">
      <div className="card p-0 overflow-hidden">
        <canvas ref={canvasRef} width={W} height={H} className="w-full" />
      </div>

      <div className="card flex flex-wrap gap-4 items-center">
        <div className="flex gap-2">
          {[['wire','Dây dẫn (từ trường)'],['magnet','Nam châm (lưỡng cực)']].map(([v,label]) => (
            <button key={v} onClick={() => setParams(p => ({...p, mode: v}))}
              className={`px-4 py-2 rounded-lg text-sm font-medium ${params.mode===v ? 'bg-blue-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
              {label}
            </button>
          ))}
        </div>
        {params.mode === 'wire' && (
          <div className="flex-1 min-w-48">
            <div className="flex justify-between text-xs text-slate-400 mb-1">
              <span>Cường độ dòng điện I (A)</span>
              <span className="text-white font-bold">{params.current} A</span>
            </div>
            <input type="range" min={-10} max={10} step={1} value={params.current} className="w-full"
              onChange={e => setParams(p => ({...p, current: parseInt(e.target.value)}))} />
            <div className="text-xs text-slate-500 mt-1">{params.current > 0 ? '⊙ Dòng ra ngoài (ngược chiều kim đồng hồ)' : params.current < 0 ? '⊗ Dòng vào trong (theo chiều kim đồng hồ)' : 'I = 0'}</div>
          </div>
        )}
      </div>

      <div className="card text-xs text-slate-400 space-y-1">
        <div className="text-yellow-400 font-bold mb-2">📐 Định luật Ampere & Biot-Savart</div>
        {params.mode === 'wire'
          ? <><div>B = μ₀I / (2πr)</div><div>μ₀ = 4π × 10⁻⁷ T·m/A</div><div className="text-slate-500">Quy tắc vặn nắp chai: chiều quay = chiều đường sức</div></>
          : <><div>Đường sức từ bên ngoài: N → S</div><div>Đường sức từ bên trong: S → N</div><div className="text-slate-500">Từ trường mạnh nhất tại 2 cực</div></>
        }
      </div>
    </div>
  );
}

const TABS = [
  { id: 'collision', icon: '⚡', label: 'Va chạm đàn hồi', component: CollisionSim },

        <p className="text-slate-400 text-sm mt-1">Mô phỏng trực quan — Vật lý phổ thông</p>

      <div className="flex gap-2 mb-6 bg-slate-900 p-1 rounded-xl">
